<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your Submissions — Claude Code Digest</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0b0d10; color: #e6e9ef; line-height: 1.5; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 48px 24px; }
  a { color: #7aa2f7; }
  a:hover { color: #a3bffa; }
  .crumb { color: #9aa3b2; font-size: 13px; margin-bottom: 16px; }
  h1 { font-size: 28px; margin: 0 0 8px; }
  p.sub { color: #9aa3b2; margin: 0 0 32px; }
  .empty { border: 1px dashed #2a3039; border-radius: 12px; padding: 32px; color: #9aa3b2; text-align: center; }
  .empty code { background: #1a1e25; padding: 2px 6px; border-radius: 4px; color: #e6e9ef; font-size: 13px; }
  details { margin-bottom: 24px; border: 1px solid #1e232b; border-radius: 12px; padding: 16px 20px; background: #0f1217; }
  summary { cursor: pointer; font-weight: 600; font-size: 18px; padding: 4px 0; user-select: none; }
  summary::-webkit-details-marker { color: #7aa2f7; }
  .item { border-top: 1px solid #1e232b; padding: 16px 0; }
  .item:first-of-type { border-top: none; padding-top: 12px; }
  .item h3 { margin: 0 0 6px; font-size: 16px; }
  .item .hook { color: #c2c8d4; font-size: 14px; margin: 6px 0; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
  .bg-design { background: #3b2b5c; color: #c4b5fd; }
  .bg-cost { background: #1f4d3d; color: #6ee7b7; }
  .bg-viral { background: #5c2323; color: #fca5a5; }
  .bg-anthropic { background: #5c3a1f; color: #fdba74; }
  .bg-marketplace { background: #1f3a5c; color: #93c5fd; }
  .bg-mcp { background: #1f4d4d; color: #67e8f9; }
  .bg-plugin { background: #5c4a1f; color: #fde68a; }
  .bg-skill { background: #5c2343; color: #f9a8d4; }
  pre { background: #1a1e25; border: 1px solid #2a3039; border-radius: 8px; padding: 10px 12px; overflow-x: auto; font-size: 13px; position: relative; }
  pre code { font-family: "SF Mono", Monaco, Menlo, Consolas, monospace; }
  .copy { position: absolute; top: 6px; right: 6px; background: #2a3039; border: none; color: #e6e9ef; padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .copy:hover { background: #3a4049; }
  .meta { color: #6a7280; font-size: 11px; margin-top: 6px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="index.html">← Back to hub</a></div>
    <h1>Your Submissions</h1>
    <p class="sub">Items you've captured for the Claude Code digest. The daily cron auto-dedupes against this list.</p>
    <div class="empty">
      <p>No submissions yet.</p>
      <p>Add one with <code>/digest-add &lt;item&gt;</code> in any Claude Code session.</p>
    </div>
  </div>
  <script>
    document.querySelectorAll('.copy').forEach(b => b.addEventListener('click', () => {
      navigator.clipboard.writeText(b.parentElement.querySelector('code').innerText);
      const t = b.innerText; b.innerText = 'copied'; setTimeout(() => b.innerText = t, 1200);
    }));
  </script>
</body>
</html>
